<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
 <script src="https://ajaxzip3.github.io/ajaxzip3.js"></script>
<style>

body{
 background: linear-gradient(135deg,#e8f7ef,#fdeff2);
 font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial;
 margin:0;
 padding:15px;
}

form{
 max-width:420px;
 margin:auto;
 background:white;
 padding:20px;
 border-radius:12px;
 box-shadow:0 3px 10px rgba(0,0,0,0.06);
}

label{
 font-weight:bold;
 color:#4a6b63;
 display:block;
 margin-top:16px;
 font-size:15px;
}

input[type=text],
input[type=tel]{
 width:100%;
 padding:12px;
 border-radius:8px;
 border:1px solid #dfeee6;
 margin-top:6px;
 box-sizing:border-box;
 font-size:16px;
}

.radio-group{
 margin-top:8px;
 background:#fdf6f8;
 padding:10px;
 border-radius:8px;
}

input[type=radio]{
 margin-right:6px;
 transform:scale(1.1);
}

button{
 width:100%;
 margin-top:25px;
 padding:14px;
 border:none;
 border-radius:10px;
 background:#7ec8a5;
 color:white;
 font-size:16px;
 font-weight:bold;
}

button:active{
 background:#6bb596;
}

</style>
</head>
<body>
  
  <form action="https://script.google.com/macros/s/AKfycbxmOL1fTpWDyY6zgHuWxA4SyqffKUgzJs5MqG7RuvBcWYsO-gtn375u_mNgxSX8-mvC0g/exec" method="post">

<label>姓</label><br>
<input type="text" name="lastName" autocomplete="lastname" required><br>

<label>名</label><br>
<input type="text" name="firstName"  autocomplete="firstname" required><br>

<label>郵便番号</label><br>
<input type="text" name="zipCode"
onKeyUp="AjaxZip3.zip2addr(this,'','pref','addr');"
pattern="\d{7}"
placeholder="例：5500005"
autocomplete="postal-code"
inputmode="numeric"
required>
   
<label>都道府県・市区町村</label>
<input type="text" name="pref"　required>

<label>町名・番地</label>
<input type="text" name="addr" autocomplete="street-address" required>
   
<label>電話番号</label><br>
<input type="tel" name="phone"  autocomplete="tel" required><br>

<label>お薬手帳について</label><br>
<input type="radio" name="medBook" value="手帳アプリ使用中" required> 手帳アプリ使用中<br>
<input type="radio" name="medBook" value="紙の手帳持参" required> 紙の手帳持参<br>
<input type="radio" name="medBook" value="手帳忘れ"  checked>手帳忘れ  <br>
<input type="radio" name="medBook" value="新規作成希望（アプリ）" required> 新規作成希望（アプリ）<br>
<input type="radio" name="medBook" value="新規作成希望（手帳）" required> 新規作成希望（手帳）<br>

<label>使用中の薬について</label><br>
<input type="radio" name="currentMed" value="定期的に使っている薬がある" required> 定期的に使っている薬がある<br>
<input type="radio" name="currentMed" value="たまに使用する薬あり" required> たまに使用する薬あり<br>
<input type="radio" name="currentMed" value="特になし" checked>特になし<br>

<label>女性の方にお伺いします（該当しない場合はチェックなし）</label><br>
<input type="radio" name="femaleCheck" value="妊娠中（4か月まで）"> 妊娠中（4か月まで）<br>
<input type="radio" name="femaleCheck" value="妊娠中（4か月以降）"> 妊娠中（4か月以降）<br>
<input type="radio" name="femaleCheck" value="妊娠の可能性あり"> 妊娠の可能性あり<br>
<input type="radio" name="femaleCheck" value="授乳中"> 授乳中<br>

<label>中学生までのお子様の体重</label><br>
<input type="text" name="childWeight"><br>

<button type="submit">送信</button>
</form>

</body>
</html>
